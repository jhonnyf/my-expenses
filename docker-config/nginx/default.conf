server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public; # No Laravel, a pasta pública é a /public

    # up-config.ini libera upload_max_filesize=50M no PHP, mas o padrão do nginx
    # (client_max_body_size 1m) rejeitava antes de chegar no PHP-FPM.
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Assets versionados pelo Vite (hash no nome do arquivo): cache longo é seguro.
    location ^~ /build/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000; # "app" é o nome do serviço no docker-compose
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Alinhado ao request_terminate_timeout=600 do up-config.ini — sem isso,
        # nginx derruba (504) requests do PHP com mais de 60s (ex: export de PDF).
        fastcgi_read_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}