upload_max_filesize=50M
post_max_size=50M
memory_limit=1G
max_execution_time=600
default_socket_timeout=3600
request_terminate_timeout=600

; app (294) + vendor (9.569) já soma ~9.9k arquivos PHP, perto do limite antigo de 10000;
; deixando folga para o projeto crescer sem o opcache começar a descartar cache.
opcache.max_accelerated_files=20000

; realpath_cache padrão do PHP (4096K/120s) é baixo para uma árvore de arquivos deste
; tamanho; aumentar reduz stat() repetido em disco a cada resolução de path/autoload.
realpath_cache_size=8192K
realpath_cache_ttl=600

; Ambiente de desenvolvimento: valida timestamp do arquivo a cada request (freq 0),
; então mudanças no código são refletidas sem precisar reiniciar o PHP-FPM.
opcache.enable=1
opcache.revalidate_freq=0
opcache.validate_timestamps=1
opcache.memory_consumption=192
opcache.interned_strings_buffer=16
opcache.fast_shutdown=1