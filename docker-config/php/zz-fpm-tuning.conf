; Sobrescreve o pool "www" padrão da imagem (pm.max_children=5, muito baixo para
; qualquer carga concorrente). Carregado depois de www.conf (ordem alfabética:
; docker.conf, www.conf, zz-fpm-tuning.conf), então os valores abaixo prevalecem.
;
; Regra prática para dimensionar pm.max_children: (RAM disponível para o container) /
; (memória média por processo PHP). Os valores abaixo assumem ~128M por processo;
; ajuste conforme a RAM real do host/container.
[www]
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
